<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低代码开发平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body>
<main class="landing-shell">
    <section class="landing-card home-action-panel">
        <div class="panel-badge">Low-Code Studio</div>
        <h1>低代码开发平台</h1>
        <p class="panel-lead">点击左侧入口后弹出项目操作窗口，可选择创建、打开或导入对应项目。</p>

        <div class="entry-list">
            <button class="entry-btn workflow" type="button" data-entry-project="workflow">
                <span class="entry-tag">Workflow</span>
                <strong>智能工作流</strong>
                <em>创建、打开和导入工作流项目</em>
            </button>

            <button class="entry-btn screen" type="button" data-entry-project="screen">
                <span class="entry-tag">Screen</span>
                <strong>大屏应用</strong>
                <em>创建、打开和导入大屏应用项目</em>
            </button>
        </div>
    </section>

    <aside class="landing-side">
        <section class="landing-card intro-panel">
            <p class="intro-tag">项目介绍</p>
            <h2>统一承接工作流与大屏应用的低代码门户</h2>
            <p>
                当前项目已经完成工作流开发的基础后端能力，并逐步补齐前端可视化入口。
                主页现在负责统一项目进入方式，并在下方展示最近打开、编辑或保存过的项目。
            </p>

            <div class="intro-grid">
                <div class="intro-block">
                    <span>智能工作流</span>
                    <strong>节点拖拽、流程执行、调试与项目端口配置</strong>
                </div>
                <div class="intro-block">
                    <span>本地项目仓库</span>
                    <strong>先本地保存，后续可平滑切换到上游服务器数据库</strong>
                </div>
                <div class="intro-block">
                    <span>统一入口</span>
                    <strong>通过弹窗选择创建、打开、导入，而不是直接分散跳转</strong>
                </div>
                <div class="intro-block">
                    <span>最近项目</span>
                    <strong>按时间倒序展示，点击即可重新打开</strong>
                </div>
            </div>
        </section>

        <section class="landing-card recent-panel">
            <div class="recent-header">
                <div>
                    <p class="intro-tag">最近项目</p>
                    <h3>最近打开</h3>
                </div>
                <button class="recent-refresh-btn" type="button" id="refreshRecentBtn">刷新</button>
            </div>
            <div class="recent-list" id="recentProjectsList"></div>
        </section>
    </aside>
</main>

<div class="home-modal-mask" id="homeModalMask" style="display:none;">
    <div class="home-modal">
        <div class="home-modal-header">
            <div>
                <div class="home-modal-tag" id="homeModalTag">项目入口</div>
                <div class="home-modal-title" id="homeModalTitle">选择操作</div>
            </div>
            <button class="home-modal-close" id="homeModalCloseBtn" type="button" title="关闭">×</button>
        </div>
        <div class="home-modal-body" id="homeModalBody"></div>
    </div>
</div>

<script>
    window.editorEntries = {
        workflow: "{{ url_for('workflow_editor') }}",
        screen: "{{ url_for('screen_editor') }}"
    };
</script>
<script type="module" src="{{ url_for('static', filename='home.js') }}"></script>
</body>
</html>

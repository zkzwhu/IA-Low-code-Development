<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏应用编辑器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='screenEditor.css') }}">
</head>
<body>
<div class="screen-shell">
    <header class="screen-topbar">
        <div class="topbar-left">
            <a class="menu-back-btn" href="{{ url_for('home') }}">返回主菜单</a>
            <div>
                <p class="topbar-eyebrow">Screen Builder</p>
                <h1>低代码大屏编辑器</h1>
            </div>
        </div>
        <div class="topbar-actions">
            <button type="button" class="topbar-btn" id="importScreenBtn">导入 JSON</button>
            <button type="button" class="topbar-btn" id="exportScreenBtn">导出 JSON</button>
            <button type="button" class="topbar-btn primary" id="runScreenBtn">运行生成网页</button>
        </div>
    </header>

    <main class="editor-layout">
        <aside class="components-panel">
            <div class="panel-header">组件库</div>
            <div class="panel-subtitle">支持文本、图片、CSV 图表，以及智慧农业的系统数据卡、环境监测卡和通讯状态卡。</div>
            <div class="components-list" id="screenComponentLibrary"></div>
        </aside>

        <section class="canvas-panel">
            <div class="canvas-toolbar screen-statusbar">
                <div class="statusbar-tools">
                    <button type="button" class="statusbar-action-btn" id="screenSelectAllBtn">全选</button>
                    <button type="button" class="statusbar-action-btn" id="screenCopyBtn">复制</button>
                    <button type="button" class="statusbar-action-btn" id="screenCutBtn">剪切</button>
                    <button type="button" class="statusbar-action-btn" id="screenPasteBtn">粘贴</button>
                    <button type="button" class="statusbar-action-btn" id="screenDuplicateBtn">复制一份</button>
                    <button type="button" class="statusbar-action-btn" id="screenBringToFrontBtn">置顶</button>
                    <button type="button" class="statusbar-action-btn danger" id="screenDeleteBtn">删除</button>
                </div>
                <div class="statusbar-right">
                    <button type="button" class="statusbar-btn" id="screenZoomOutBtn">-</button>
                    <button type="button" class="statusbar-btn" id="screenZoomResetBtn">100%</button>
                    <button type="button" class="statusbar-btn" id="screenZoomInBtn">+</button>
                    <span class="statusbar-zoom" id="screenZoomLabel">缩放 100%</span>
                </div>
            </div>
            <div class="canvas-area" id="screenCanvasArea">
                <div class="screen-viewport" id="screenViewport">
                    <div class="screen-stage" id="screenStage"></div>
                </div>
            </div>
        </section>

        <aside class="properties-panel">
            <div class="panel-header">属性面板</div>
            <div class="prop-content" id="screenPropContent"></div>
        </aside>
    </main>
</div>

<input id="screenImportInput" type="file" accept=".json,application/json" hidden>

<script type="module" src="{{ url_for('static', filename='screenEditor.js') }}"></script>
</body>
</html>
